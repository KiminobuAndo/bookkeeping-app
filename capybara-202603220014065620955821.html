  <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-lg shadow">
    <h2 class="text-2xl font-bold text-center text-gray-900">ログイン</h2>

    <form class="new_user" id="new_user" action="/users/sign_in" accept-charset="UTF-8" method="post">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700" for="user_email">メールアドレス</label>
          <input autofocus="autofocus" autocomplete="email" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" type="email" value="" name="user[email]" id="user_email">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700" for="user_password">パスワード</label>
          <input autocomplete="current-password" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500" type="password" name="user[password]" id="user_password">
        </div>

          <div class="flex items-center gap-2">
            <input name="user[remember_me]" type="hidden" value="0" autocomplete="off"><input class="h-4 w-4 rounded border-gray-300 text-blue-600" type="checkbox" value="1" name="user[remember_me]" id="user_remember_me">
            <label class="text-sm text-gray-700" for="user_remember_me">ログイン状態を保持する</label>
          </div>

        <input type="submit" name="commit" value="ログイン" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 cursor-pointer" data-disable-with="ログイン">
      </div>
</form>
